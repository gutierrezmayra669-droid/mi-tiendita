<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tiendita - Nieves, Abarrotes y Papelería</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title {
            flex: 1;
        }
        h1 {
            color: #667eea;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 1.1em;
        }
        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5em;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }
        .auth-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .auth-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: bold;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .login-btn {
            background: #667eea;
            color: white;
        }
        .login-btn:hover {
            background: #764ba2;
        }
        .register-btn {
            background: #764ba2;
            color: white;
        }
        .register-btn:hover {
            background: #667eea;
        }
        .logout-btn {
            background: #ff6b6b;
            color: white;
        }
        .logout-btn:hover {
            background: #ee5a52;
        }
        .admin-btn {
            background: #ffa500;
            color: white;
        }
        .admin-btn:hover {
            background: #ff8c00;
        }
        .user-info {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }
        .modal.show {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
        }
        .modal-content {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 500px;
            margin-bottom: 50px;
        }
        .modal-header {
            font-size: 1.8em;
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .form-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s;
        }
        .submit-btn {
            background: #667eea;
            color: white;
        }
        .submit-btn:hover {
            background: #764ba2;
        }
        .cancel-btn {
            background: #ddd;
            color: #333;
        }
        .cancel-btn:hover {
            background: #ccc;
        }
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .category-tab {
            padding: 10px 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .category-tab:hover {
            border-color: #667eea;
        }
        .category-tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .product {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .product:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }
        .product-image {
            width: 100%;
            height: 150px;
            background: #f0f0f0;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            overflow: hidden;
        }
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-name {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .product-price {
            font-size: 1.5em;
            color: #667eea;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .product-desc {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .product-quantity {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        .quantity-btn {
            background: #ddd;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        .quantity-btn:hover {
            background: #ccc;
        }
        .quantity-input {
            width: 50px;
            padding: 5px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #764ba2;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .admin-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .admin-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ddd;
        }
        .admin-section:last-child {
            border-bottom: none;
        }
        .admin-section h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .admin-products-list {
            display: grid;
            gap: 15px;
        }
        .admin-product-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-product-info {
            flex: 1;
        }
        .admin-product-actions {
            display: flex;
            gap: 10px;
        }
        .admin-btn-small {
            padding: 5px 10px;
            font-size: 0.85em;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .edit-btn {
            background: #667eea;
            color: white;
        }
        .delete-btn {
            background: #ff6b6b;
            color: white;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #d4edda;
            color: #155724;
            padding: 15px 20px;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 2000;
        }
        .notification.show {
            display: block;
            animation: slideIn 0.3s ease-in-out;
        }
        @keyframes slideIn {
            from {
                transform: translateX(400px);
            }
            to {
                transform: translateX(0);
            }
        }
        .page-section {
            display: none;
        }
        .page-section.active {
            display: block;
        }
        footer {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <h1>🏪 Mi Tiendita 🏪</h1>
                <p class="subtitle">Nieves, Abarrotes y Papelería</p>
            </div>
            <div class="header-actions">
                <div class="cart-icon" onclick="showCart()">
                    🛒
                    <span class="cart-count" id="cartCount" style="display: none;">0</span>
                </div>
                <span id="userInfo" class="user-info" style="display: none;"></span>
                <button id="profileBtn" class="auth-btn login-btn" onclick="showProfile()" style="display: none;">Mi Perfil</button>
                <button id="adminBtn" class="auth-btn admin-btn" onclick="showAdmin()" style="display: none !important;">Admin</button>
                <button id="loginBtn" class="auth-btn login-btn" onclick="showLoginModal()">Iniciar Sesión</button>
                <button id="registerBtn" class="auth-btn register-btn" onclick="showRegisterModal()">Registrarse</button>
                <button id="logoutBtn" class="auth-btn logout-btn" onclick="logout()" style="display: none;">Cerrar Sesión</button>
            </div>
        </header>

        <!-- Home Page -->
        <div id="homePage" class="page-section active">
            <div class="category-tabs">
                <div class="category-tab active" onclick="filterByCategory('nieves')">🍦 Nieves</div>
                <div class="category-tab" onclick="filterByCategory('abarrotes')">🥫 Abarrotes</div>
                <div class="category-tab" onclick="filterByCategory('papeleria')">📚 Papelería</div>
            </div>
            <div class="products" id="productsContainer"></div>
            <footer>
                <p>&copy; 2024 Mi Tiendita. Todos los derechos reservados.</p>
            </footer>
        </div>

        <!-- Profile Page -->
        <div id="profilePage" class="page-section">
            <div style="background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
                <h2 style="color: #667eea; margin-bottom: 20px;">Mi Perfil</h2>
                <div id="profileInfo"></div>
                <button class="auth-btn login-btn" onclick="showHome()" style="margin-top: 20px;">Volver a Inicio</button>
            </div>
        </div>

        <!-- Admin Page -->
        <div id="adminPage" class="page-section">
            <div class="admin-panel">
                <h2 style="color: #667eea; margin-bottom: 20px;">Panel de Administrador</h2>
                <button class="auth-btn login-btn" onclick="showHome()" style="margin-bottom: 20px;">Volver a Inicio</button>
                
                <!-- Add Product Section -->
                <div class="admin-section">
                    <h3>Agregar Nuevo Producto</h3>
                    <form onsubmit="addProduct(event)">
                        <div class="form-group">
                            <label>Categoría:</label>
                            <select id="adminCategory" required>
                                <option value="nieves">Nieves</option>
                                <option value="abarrotes">Abarrotes</option>
                                <option value="papeleria">Papelería</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nombre del Producto:</label>
                            <input type="text" id="adminProductName" required>
                        </div>
                        <div class="form-group">
                            <label>Precio ($):</label>
                            <input type="number" id="adminProductPrice" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Descripción:</label>
                            <textarea id="adminProductDesc" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Emoji o Imagen URL:</label>
                            <input type="text" id="adminProductImage" placeholder="ej: 🍨 o https://...">
                        </div>
                        <button type="submit" class="submit-btn">Agregar Producto</button>
                    </form>
                </div>

                <!-- Products Management Section -->
                <div class="admin-section">
                    <h3>Gestionar Productos</h3>
                    <div id="adminProductsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Iniciar Sesión</div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Correo Electrónico:</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Contraseña:</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="form-btn submit-btn">Iniciar Sesión</button>
                    <button type="button" class="form-btn cancel-btn" onclick="closeLoginModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Registrarse</div>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nombre Completo:</label>
                    <input type="text" id="registerName" required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico:</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label>Contraseña:</label>
                    <input type="password" id="registerPassword" required>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="form-btn submit-btn">Registrarse</button>
                    <button type="button" class="form-btn cancel-btn" onclick="closeRegisterModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">🛒 Carrito de Compras</div>
            <div id="cartItems"></div>
            <div class="form-buttons" style="margin-top: 20px;">
                <button class="form-btn submit-btn" onclick="checkout()">Proceder al Pago</button>
                <button class="form-btn cancel-btn" onclick="closeCart()">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Edit Product Modal -->
    <div id="editProductModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Editar Producto</div>
            <form onsubmit="updateProduct(event)">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" id="editProductName" required>
                </div>
                <div class="form-group">
                    <label>Precio ($):</label>
                    <input type="number" id="editProductPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Descripción:</label>
                    <textarea id="editProductDesc" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Emoji o Imagen URL:</label>
                    <input type="text" id="editProductImage">
                </div>
                <div class="form-buttons">
                    <button type="submit" class="form-btn submit-btn">Guardar Cambios</button>
                    <button type="button" class="form-btn cancel-btn" onclick="closeEditModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        let products = [];
        let cart = [];
        let currentUser = null;
        let currentCategory = 'nieves';

        // Default products
        const DEFAULT_PRODUCTS = [
            { id: 1, category: 'nieves', name: 'Nieves de Vaso', price: 2.50, image: '🍨', desc: 'Deliciosas nieves en vaso' },
            { id: 2, category: 'nieves', name: 'Raspa Chaguitos', price: 1.50, image: '🍧', desc: 'Raspa refrescante' },
            { id: 3, category: 'nieves', name: 'Paletas de Crema', price: 1.00, image: '🍦', desc: 'Paletas cremosas' },
            { id: 4, category: 'abarrotes', name: 'Arroz', price: 3.50, image: '🌾', desc: 'Arroz de calidad' },
            { id: 5, category: 'abarrotes', name: 'Frijoles', price: 2.00, image: '🫘', desc: 'Frijoles frescos' },
            { id: 6, category: 'abarrotes', name: 'Aceite', price: 4.00, image: '🫗', desc: 'Aceite puro' },
            { id: 7, category: 'papeleria', name: 'Cuaderno', price: 1.50, image: '📓', desc: 'Cuaderno 100 hojas' },
            { id: 8, category: 'papeleria', name: 'Lápices', price: 0.50, image: '✏️', desc: 'Lápices HB' },
            { id: 9, category: 'papeleria', name: 'Bolígrafos', price: 0.75, image: '🖊️', desc: 'Bolígrafos azules' }
        ];

        window.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            const user = localStorage.getItem('currentUser');
            if (user) {
                currentUser = JSON.parse(user);
                updateUIForLoggedIn(currentUser);
            }
            renderProducts();
            loadCart();
        });

        function loadProducts() {
            const saved = localStorage.getItem('products');
            if (saved) {
                products = JSON.parse(saved);
            } else {
                products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
                saveProducts();
            }
        }

        function saveProducts() {
            localStorage.setItem('products', JSON.stringify(products));
        }

        function filterByCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts();
        }

        function renderProducts() {
            const filtered = products.filter(p => p.category === currentCategory);
            const container = document.getElementById('productsContainer');
            container.innerHTML = filtered.map(product => `
                <div class="product">
                    <div class="product-image">${product.image}</div>
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">$${product.price.toFixed(2)}</div>
                    <div class="product-desc">${product.desc}</div>
                    <div class="product-quantity">
                        <button class="quantity-btn" onclick="changeQty(${product.id}, -1)">-</button>
                        <input type="number" class="quantity-input" id="qty-${product.id}" value="1" min="1">
                        <button class="quantity-btn" onclick="changeQty(${product.id}, 1)">+</button>
                    </div>
                    <button class="btn" onclick="addToCart(${product.id})">Agregar al Carrito</button>
                </div>
            `).join('');
        }

        function changeQty(productId, change) {
            const input = document.getElementById(`qty-${productId}`);
            let value = parseInt(input.value) + change;
            if (value < 1) value = 1;
            input.value = value;
        }

        function addToCart(productId) {
            if (!currentUser) {
                showLoginModal();
                return;
            }
            const quantity = parseInt(document.getElementById(`qty-${productId}`).value);
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity += quantity;
            } else {
                cart.push({ ...product, quantity });
            }
            saveCart();
            updateCartCount();
            showNotification(`${product.name} agregado al carrito`);
            document.getElementById(`qty-${productId}`).value = 1;
        }

        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function loadCart() {
            const saved = localStorage.getItem('cart');
            if (saved) {
                cart = JSON.parse(saved);
                updateCartCount();
            }
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            const countEl = document.getElementById('cartCount');
            if (count > 0) {
                countEl.textContent = count;
                countEl.style.display = 'flex';
            } else {
                countEl.style.display = 'none';
            }
        }

        function showCart() {
            if (!currentUser) {
                showLoginModal();
                return;
            }
            const cartItemsDiv = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<p style="text-align: center; color: #666;">Tu carrito está vacío</p>';
            } else {
                const total = cart.reduce((sum, item) => sum + (item.quantity * item.price), 0);
                cartItemsDiv.innerHTML = cart.map((item, index) => `
                    <div style="background: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 10px;">
                        <div><strong>${item.image} ${item.name}</strong></div>
                        <div>Cantidad: ${item.quantity} x $${item.price.toFixed(2)}</div>
                        <div>Subtotal: $${(item.quantity * item.price).toFixed(2)}</div>
                        <button class="delete-btn" style="margin-top: 10px;" onclick="removeFromCart(${index})">Eliminar</button>
                    </div>
                `).join('');
                cartItemsDiv.innerHTML += `<div style="background: white; padding: 15px; border-radius: 5px; text-align: right; font-weight: bold; color: #667eea; font-size: 1.2em;">Total: $${total.toFixed(2)}</div>`;
            }
            document.getElementById('cartModal').classList.add('show');
        }

        function closeCart() {
            document.getElementById('cartModal').classList.remove('show');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            saveCart();
            updateCartCount();
            showCart();
        }

        function checkout() {
            if (cart.length === 0) {
                showNotification('Tu carrito está vacío');
                return;
            }
            const total = cart.reduce((sum, item) => sum + (item.quantity * item.price), 0);
            const order = {
                id: 'ORD-' + Date.now(),
                userId: currentUser.email,
                items: cart,
                total: total,
                status: 'pending',
                date: new Date().toISOString()
            };
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            cart = [];
            saveCart();
            updateCartCount();
            closeCart();
            showNotification('¡Pedido confirmado! ID: ' + order.id);
        }

        function showLoginModal() {
            document.getElementById('loginModal').classList.add('show');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('show');
        }

        function showRegisterModal() {
            document.getElementById('registerModal').classList.add('show');
        }

        function closeRegisterModal() {
            document.getElementById('registerModal').classList.remove('show');
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                currentUser = user;
                localStorage.setItem('currentUser', JSON.stringify(user));
                updateUIForLoggedIn(user);
                closeLoginModal();
                showNotification('¡Bienvenido!');
            } else {
                showNotification('Correo o contraseña incorrectos');
            }
        }

        function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.email === email)) {
                showNotification('Este correo ya está registrado');
                return;
            }
            const newUser = { name, email, password };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            currentUser = newUser;
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            updateUIForLoggedIn(newUser);
            closeRegisterModal();
            showNotification('¡Registro exitoso!');
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            updateUIForLoggedOut();
            showHome();
            showNotification('Sesión cerrada');
        }

        function updateUIForLoggedIn(user) {
            document.getElementById('userInfo').textContent = '👤 ' + user.name;
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('registerBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('profileBtn').style.display = 'block';
            
            if (user.email === 'gutierrezmayra669@gmail.com') {
                document.getElementById('adminBtn').style.setProperty('display', 'block', 'important');
            }
        }

        function updateUIForLoggedOut() {
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('registerBtn').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('profileBtn').style.display = 'none';
            document.getElementById('adminBtn').style.display = 'none';
        }

        function showHome() {
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
            document.getElementById('homePage').classList.add('active');
        }

        function showProfile() {
            if (!currentUser) {
                showLoginModal();
                return;
            }
            document.getElementById('profileInfo').innerHTML = `
                <p><strong>Nombre:</strong> ${currentUser.name}</p>
                <p><strong>Email:</strong> ${currentUser.email}</p>
            `;
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
            document.getElementById('profilePage').classList.add('active');
        }

        function showAdmin() {
            if (!currentUser || currentUser.email !== 'gutierrezmayra669@gmail.com') {
                showNotification('Acceso denegado');
                return;
            }
            renderAdminProducts();
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
            document.getElementById('adminPage').classList.add('active');
        }

        function renderAdminProducts() {
            const list = document.getElementById('adminProductsList');
            list.innerHTML = products.map(product => `
                <div class="admin-product-item">
                    <div class="admin-product-info">
                        <div><strong>${product.image} ${product.name}</strong></div>
                        <div>Categoría: ${product.category} | Precio: $${product.price.toFixed(2)}</div>
                    </div>
                    <div class="admin-product-actions">
                        <button class="admin-btn-small edit-btn" onclick="editProduct(${product.id})">Editar</button>
                        <button class="admin-btn-small delete-btn" onclick="deleteProduct(${product.id})">Eliminar</button>
                    </div>
                </div>
            `).join('');
        }

        function addProduct(event) {
            event.preventDefault();
            const newId = Math.max(...products.map(p => p.id), 0) + 1;
            const product = {
                id: newId,
                category: document.getElementById('adminCategory').value,
                name: document.getElementById('adminProductName').value,
                price: parseFloat(document.getElementById('adminProductPrice').value),
                image: document.getElementById('adminProductImage').value || '📦',
                desc: document.getElementById('adminProductDesc').value
            };
            products.push(product);
            saveProducts();
            event.target.reset();
            renderAdminProducts();
            showNotification('Producto agregado exitosamente');
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            document.getElementById('editProductId').value = id;
            document.getElementById('editProductName').value = product.name;
            document.getElementById('editProductPrice').value = product.price;
            document.getElementById('editProductDesc').value = product.desc;
            document.getElementById('editProductImage').value = product.image;
            document.getElementById('editProductModal').classList.add('show');
        }

        function updateProduct(event) {
            event.preventDefault();
            const id = parseInt(document.getElementById('editProductId').value);
            const product = products.find(p => p.id === id);
            product.name = document.getElementById('editProductName').value;
            product.price = parseFloat(document.getElementById('editProductPrice').value);
            product.desc = document.getElementById('editProductDesc').value;
            product.image = document.getElementById('editProductImage').value;
            saveProducts();
            closeEditModal();
            renderAdminProducts();
            showNotification('Producto actualizado exitosamente');
        }

        function deleteProduct(id) {
            if (confirm('¿Estás seguro de que deseas eliminar este producto?')) {
                products = products.filter(p => p.id !== id);
                saveProducts();
                renderAdminProducts();
                showNotification('Producto eliminado exitosamente');
            }
        }

        function closeEditModal() {
            document.getElementById('editProductModal').classList.remove('show');
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        window.onclick = function(event) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (event.target === modal) {
                    modal.classList.remove('show');
                }
            });
        }
    </script>
</body>
</html>
