<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tiendita - Tienda Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .header { background: #2B9EB3; color: white; padding: 15px; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 10px; }
        .categories { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .category-btn { padding: 10px 20px; background: #ddd; border: none; cursor: pointer; border-radius: 5px; }
        .category-btn.active { background: #2B9EB3; color: white; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin: 20px 0; }
        .product { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-name { font-weight: bold; margin: 10px 0; }
        .product-price { color: #2B9EB3; font-size: 18px; font-weight: bold; }
        .btn { padding: 10px 15px; background: #2B9EB3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn:hover { background: #1f7a8f; }
        .cart-btn { background: #ff9800; }
        .auth-buttons { text-align: right; margin: 10px 0; }
        .auth-btn { padding: 8px 15px; margin: 0 5px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 400px; }
        .modal-close { float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .notification { position: fixed; top: 20px; right: 20px; background: #4CAF50; color: white; padding: 15px 20px; border-radius: 5px; z-index: 10000; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛒 Mi Tiendita</h1>
        <div class="auth-buttons">
            <button class="auth-btn" onclick="showLogin()">Iniciar Sesión</button>
            <button class="auth-btn" onclick="showRegister()">Registrarse</button>
            <button class="auth-btn cart-btn" onclick="showCart()">🛒 Carrito</button>
            <button class="auth-btn" id="adminBtn" style="display:none;" onclick="showAdmin()">Panel Admin</button>
        </div>
    </div>

    <div class="container">
        <div class="categories" id="categories"></div>
        <div class="products" id="products"></div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeLogin()">&times;</span>
            <h2>Iniciar Sesión</h2>
            <input type="email" id="loginEmail" placeholder="Correo" required>
            <input type="password" id="loginPassword" placeholder="Contraseña" required>
            <button class="btn" onclick="handleLogin()">Entrar</button>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeRegister()">&times;</span>
            <h2>Registrarse</h2>
            <input type="text" id="registerName" placeholder="Nombre" required>
            <input type="email" id="registerEmail" placeholder="Correo" required>
            <input type="password" id="registerPassword" placeholder="Contraseña" required>
            <button class="btn" onclick="handleRegister()">Registrarse</button>
        </div>
    </div>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeCart()">&times;</span>
            <h2>Carrito</h2>
            <div id="cartItems"></div>
            <h3>Total: $<span id="cartTotal">0.00</span></h3>
            <button class="btn" onclick="checkout()">Confirmar Pedido</button>
        </div>
    </div>

    <script>
        // Simple data structure
        const ADMIN_EMAIL = 'gutierrezmayra669@gmail.com';
        const ADMIN_PASSWORD = 'admin123';
        
        let currentUser = null;
        let cart = [];
        let currentCategory = 'nieves';
        
        const products = [
            { id: 1, name: 'Nieves de Vaso', price: 25, category: 'nieves', image: '🍨' },
            { id: 2, name: 'Raspa Chaguitos', price: 15, category: 'nieves', image: '🍧' },
            { id: 3, name: 'Paletas de Crema', price: 10, category: 'nieves', image: '🍦' },
            { id: 4, name: 'Arroz', price: 35, category: 'abarrotes', image: '🌾' },
            { id: 5, name: 'Frijoles', price: 20, category: 'abarrotes', image: '🫘' },
            { id: 6, name: 'Aceite', price: 40, category: 'abarrotes', image: '🫗' },
            { id: 7, name: 'Cuaderno', price: 15, category: 'papeleria', image: '📓' },
            { id: 8, name: 'Lápices', price: 5, category: 'papeleria', image: '✏️' },
            { id: 9, name: 'Bolígrafos', price: 7.50, category: 'papeleria', image: '🖊️' },
            { id: 10, name: 'Arabela Premium 1', price: 50, category: 'arabela', image: '✨' },
            { id: 11, name: 'Arabela Premium 2', price: 75, category: 'arabela', image: '💎' },
            { id: 12, name: 'Arabela Premium 3', price: 100, category: 'arabela', image: '👑' }
        ];
        
        const categories = ['nieves', 'abarrotes', 'papeleria', 'arabela'];
        
        function init() {
            renderCategories();
            renderProducts();
            checkSession();
        }
        
        function renderCategories() {
            const container = document.getElementById('categories');
            container.innerHTML = categories.map(cat => 
                `<button class="category-btn ${cat === currentCategory ? 'active' : ''}" onclick="selectCategory('${cat}')">${cat.toUpperCase()}</button>`
            ).join('');
        }
        
        function selectCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderProducts();
        }
        
        function renderProducts() {
            const container = document.getElementById('products');
            const filtered = products.filter(p => p.category === currentCategory);
            container.innerHTML = filtered.map(p => `
                <div class="product">
                    <div style="font-size: 40px;">${p.image}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">$${p.price.toFixed(2)}</div>
                    <button class="btn" onclick="addToCart(${p.id})">Agregar</button>
                </div>
            `).join('');
        }
        
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(c => c.id === productId);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({...product, qty: 1});
            }
            showNotification('Agregado al carrito');
        }
        
        function showCart() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = '<p>El carrito está vacío</p>';
            } else {
                container.innerHTML = cart.map((item, idx) => `
                    <div style="padding: 10px; border-bottom: 1px solid #ddd;">
                        ${item.name} x ${item.qty} = $${(item.price * item.qty).toFixed(2)}
                        <button class="btn" style="float: right;" onclick="removeFromCart(${idx})">Eliminar</button>
                    </div>
                `).join('');
            }
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('cartTotal').textContent = total.toFixed(2);
            document.getElementById('cartModal').classList.add('show');
        }
        
        function removeFromCart(idx) {
            cart.splice(idx, 1);
            showCart();
        }
        
        function closeCart() {
            document.getElementById('cartModal').classList.remove('show');
        }
        
        function checkout() {
            if (cart.length === 0) {
                showNotification('Carrito vacío');
                return;
            }
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            showNotification(`¡Pedido confirmado! Total: $${total.toFixed(2)}`);
            cart = [];
            closeCart();
        }
        
        function showLogin() {
            document.getElementById('loginModal').classList.add('show');
        }
        
        function closeLogin() {
            document.getElementById('loginModal').classList.remove('show');
        }
        
        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                currentUser = {name: 'Admin', email: email, isAdmin: true};
                localStorage.setItem('user', JSON.stringify(currentUser));
                showNotification('¡Bienvenido Admin!');
                closeLogin();
                checkSession();
            } else {
                showNotification('Credenciales inválidas');
            }
        }
        
        function showRegister() {
            document.getElementById('registerModal').classList.add('show');
        }
        
        function closeRegister() {
            document.getElementById('registerModal').classList.remove('show');
        }
        
        function handleRegister() {
            showNotification('Registro completado');
            closeRegister();
        }
        
        function showAdmin() {
            showNotification('Panel de admin');
        }
        
        function checkSession() {
            const user = localStorage.getItem('user');
            if (user) {
                currentUser = JSON.parse(user);
                if (currentUser.isAdmin) {
                    document.getElementById('adminBtn').style.display = 'inline-block';
                }
            }
        }
        
        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }
        
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
